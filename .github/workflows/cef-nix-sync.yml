name: CEF version nix sync

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "src/Cargo.lock"

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    # Only fire when the triggering (head) commit is a Renovate cef bump.
    if: ${{ startsWith(github.event.head_commit.message, 'Update Rust crate cef') || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Update nix cef-binary if needed
        run: |
          set -o pipefail
          UPDATE_SCRIPT="$(nix-instantiate --eval -E '(builtins.getFlake (toString ./.)).packages.${builtins.currentSystem}.cef-binary.passthru.updateScript')"
          "${UPDATE_SCRIPT}" 2>&1 | tee /tmp/script.log

      - name: Build the PR body
        run: |
          {
            echo "Automated changes produced by \`cef-binary\` \`updateScript\`"
            echo "following an \`Update Rust crate cef\` commit."
            echo
            echo "<details><summary>Script output</summary>"
            echo
            echo '````'
            cat /tmp/script.log
            echo '````'
            echo
            echo "</details>"
          } > /tmp/pr-body.md

      - name: Commit and open PR
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "sync nix CEF version with Rust CEF version"
          title: "Sync nix CEF version with Rust CEF version"
          body-path: /tmp/pr-body.md
          branch: automated/cef-nix-updates
          base: ${{ github.event.repository.default_branch }}
          delete-branch: true
          labels: |
            dependencies
            automated
            nix
